<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<style>
    .hide{
        display:none;
    }

    .no-spinners::-webkit-outer-spin-button,
    .no-spinners::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    .no-spinners {
        -moz-appearance: textfield;
    }

</style>
<body>

<div id="selection-screen">
    <h3>Select action</h3>
    <div style="justify-content: space-around; display: flex; flex-direction: column">
        <button id="create-room-btn">Create room</button>
        <input id="join-input" type="number" class="no-spinners">Enter room code
        <button type="submit" id="join-room-btn">Join room</button>
    </div>
</div>


<div id="room-screen" class="hide">
    <h1 id="room-screen--code-placeholder"></h1>
    <div id="room-screen--login" style="flex-direction: column" class="hide">
        <h3>Enter your username</h3>
        <input id="login--username-input">
        <button type="submit" id="login--username-submit">Submit</button>
    </div>

    <div id="room-screen--lobby">
        <ul id="lobby--users-list"></ul>

    </div>

</div>

<p id="stream-space" class="alfa_modal"></p>


<!--<script src="script.js"></script>-->
<script type="module" src="js/main.js"></script>
</body>
</html>
